<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QHC Admin — Login</title>
    <link rel="stylesheet" href="https://yaban1981.github.io/QHC_Program/assets/styles.css">
  </head>
  <body style="padding:24px">
    <div style="max-width:820px;margin:0 auto">
      <div style="display:flex;gap:14px;align-items:center;margin-bottom:14px">
        <img alt="Québec HC" src="../logos/qhc.jpg" style="width:90px;height:auto">
        <div>
          <h2 style="margin:0">Portail Admin</h2>
          <div style="opacity:.75">Connexion — gestion des inscriptions</div>
        </div>
      </div>

      <div style="border:1px solid rgba(0,0,0,.15);border-radius:12px;padding:16px;background:rgba(255,255,255,.02)">
        <label for="pwd">Mot de passe admin</label><br>
        <input id="pwd" type="password" autocomplete="current-password" placeholder="••••••••"
               style="width:100%;margin-top:8px;padding:10px;font-size:16px" />

        <div style="display:flex;gap:10px;margin-top:12px">
          <button id="btnLogin" type="button" style="padding:10px 14px;font-size:16px">Se connecter</button>
          <button id="btnClear" type="button" style="padding:10px 14px;font-size:16px">Effacer</button>
        </div>

        <div id="msg" style="color:#b00020;white-space:pre-wrap;margin-top:10px"></div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
