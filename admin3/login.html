<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QHC Admin V3 — Login</title>
  <link rel="stylesheet" href="./admin3.css">
</head>
<body>
  <div class="page">
    <div class="hero">
      <div class="logo"><img src="../logos/qhc.jpg" alt="QHC"></div>
      <div>
        <h1>Portail Admin (V3)</h1>
        <div class="sub">Inspiré du design du formulaire · Mobile-first</div>
      </div>
    </div>

    <div class="card" style="max-width:720px;margin-top:14px">
      <label for="pwd">Mot de passe admin</label>
      <input id="pwd" type="password" placeholder="••••••••" autocomplete="current-password">
      <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btnPrimary" id="btnLogin">Se connecter</button>
        <button class="btn btnGhost" id="btnClear">Effacer</button>
      </div>
      <div id="msg" style="margin-top:10px;white-space:pre-wrap;color:#ffb3b3"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
